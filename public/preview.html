<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S-Web技术展示</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>
    <iframe id="preview-frame"></iframe>
    <script>
      const params = new URLSearchParams(window.location.search)
      const url = params.get('url')
      if (url) {
        document.getElementById('preview-frame').src = url
      } else {
        document.body.innerHTML = '<h1>Error: No preview URL provided.</h1>'
      }
    </script>
  </body>
</html>
